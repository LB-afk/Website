<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adixora</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="./Assets/Java/loader.js" defer></script>
    <script src="./Assets/Java/Scripts.js" defer></script>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .hero-gradient { background: linear-gradient(180deg, #ffffff 0%, #f3f4f6 100%); }
        .vto-button:hover { transform: scale(1.05); transition: 0.3s; }
    </style>
</head>
<body>
    <div id="header"></div>

    <!-- Discription txt -->
    <section class="hero-gradient px-10 py-20 flex flex-col md:flex-row items-center">
        <div class="md:w-1/2 space-y-6">
            <h1 class="text-6xl md:text-8xl font-bold leading-tight tracking-tighter">
                Global Styles<br>Near You
            </h1>
            <p class="text-xl text-gray-600 max-w-md">
                Premium eyewear designed in shipped by Aditya Sharma from Bhopal, India.
            </p>
            <div class="flex space-x-4 pt-4">
                <a href="Assets/Pages/collection.html">
                <button class="bg-black text-white px-8 py-4 rounded-full font-bold hover:bg-gray-800">Shop the Collection</button>
                </a>
            </div>
        </div>
        <div class="md:w-1/2 mt-12 md:mt-0 relative">
            <img src="./Assets/images/glasses.png" alt="Glasses" class="w-full rounded-lg shadow-2xl">
        </div>
    </section>

    <!-- Global Features -->
    <section class="bg-white py-20 px-10">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-12 text-center">
            <div class="space-y-3">
                <div class="text-3xl">✈️</div>
                <h3 class="font-bold text-xl">Worldwide Wide Shipping</h3>
                <p class="text-gray-500">Delivering your favorite frames across the globe</p>
            </div>
            <div class="space-y-3">
                <div class="text-3xl">😎</div>
                <h3 class="font-bold text-xl">Best Frames</h3>
                <p class="text-gray-500">Stylish design for all favorites</p>
            </div>
            <div class="space-y-3">
                <div class="text-3xl">♻️</div>
                <h3 class="font-bold text-xl">Future Impact</h3>
                <p class="text-gray-500">Every pair sold, help us reach globally.</p>
            </div>
        </div>
    </section>

    <div id="footer"></div>

</body>
</html>
